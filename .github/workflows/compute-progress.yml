name: Compute progress
on:
  push:
    branches: [main]
    paths: ["content/**", "data/roadmap.yaml"]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: data-commits
jobs:
  progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/compute_progress.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/generated
          git diff --cached --quiet || { git commit -m "chore: update progress.json [skip ci]"; git push; }
