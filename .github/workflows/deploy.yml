name: Deploy Quartz site to GitHub Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - "data/generated/**"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}{1}', github.workspace, '/package-lock.json')) }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v6
        with:
          path: node_modules/.quartz-cache
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles(format('{0}{1}', github.workspace, '/quartz.lock.json')) }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-
      - run: npm ci
      - run: npx quartz plugin install --concurrency 2
      - run: npx quartz plugin install --from-config --concurrency 2
      - run: npx quartz build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
