name: Spaced review reminders
on:
  schedule:
    - cron: "0 22 * * *"   # 03:30 IST nightly
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/spaced_review.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
